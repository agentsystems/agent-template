# AgentSystems Agent Metadata
#
# This file defines your agent's identity and requirements.
# Replace the placeholder values below with your own.

# Your GitHub username or organization
developer: your-org

# Agent name - unique within your developer identity
# This agent will be accessible at: http://localhost:18080/invoke/demo-agent
name: demo-agent

# Version using semantic versioning (major.minor.patch)
version: 0.1.0

# Description shown in the AgentSystems UI
description: "Demo agent that returns historical events for a date and creates a story"

# Repository URLs
image_repository_url: ""
source_repository_url: ""

# Visibility and access
listing_status: "unlisted"  # "listed" or "unlisted"
image_repository_access: "private"  # "public" or "private"
source_repository_access: "private"  # "public" or "private"

# Models used in your agent code
# Must match get_model() calls in main.py
# Platform operators configure model connections before agents can run
model_dependencies:
  - gemma3:1b  # Local model, no API keys needed

# See all supported models: https://docs.agentsystems.ai/deploy-agents/supported-models
