name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit (all files)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Docker Compose up (build & detach)
        run: |
          docker compose -f compose/docker-standard.yml up -d --build

      - name: Wait for /health to return 200
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8000/health >/dev/null; then
              echo "Service healthy"; exit 0; fi
            sleep 2
          done
          echo "Health check failed" && docker compose logs && exit 1

      - name: Cleanup
        if: always()
        run: docker compose -f compose/docker-standard.yml down -v || true
